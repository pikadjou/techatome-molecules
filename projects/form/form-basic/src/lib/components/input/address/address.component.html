<ta-form-label [input]="this.input"></ta-form-label>

<div class="address-form flex-column g-space-md">
  @if (this.searchEnabled) {
    <div class="address-search">
      <ta-font-icon class="address-search__icon" name="search" type="sm"></ta-font-icon>
      <input
        #googleSearchInput
        class="address-search__input"
        type="text"
        autocomplete="off"
        [placeholder]="'form.address.search-google' | translate"
      />
    </div>
    <span class="address-search__hint">{{ 'form.address.search-hint' | translate }}</span>
  }

  <div class="grid g-space-sm">
    <div class="one-half">
      <ta-input-textbox
        [input]="this.streetInput"
        [standalone]="true"
        (valueChanged)="this.onSubInputChanged()"
      ></ta-input-textbox>
    </div>
    <div class="one-fourth">
      <ta-input-textbox
        [input]="this.numberInput"
        [standalone]="true"
        (valueChanged)="this.onSubInputChanged()"
      ></ta-input-textbox>
    </div>
    <div class="one-fourth">
      <ta-input-textbox
        [input]="this.complementInput"
        [standalone]="true"
        (valueChanged)="this.onSubInputChanged()"
      ></ta-input-textbox>
    </div>

    @if (this.localityAvailable) {
      <div class="full">
        <ta-input-choices
          [input]="this.localityInput"
          [standalone]="true"
          (valueChanged)="this.onLocalitySelected()"
        ></ta-input-choices>
      </div>
    } @else {
      <div class="one-third">
        <ta-input-textbox
          [input]="this.zipCodeInput"
          [standalone]="true"
          (valueChanged)="this.onSubInputChanged()"
        ></ta-input-textbox>
      </div>
      <div class="two-thirds">
        <ta-input-textbox
          [input]="this.cityInput"
          [standalone]="true"
          (valueChanged)="this.onSubInputChanged()"
        ></ta-input-textbox>
      </div>
    }

    <div class="full">
      <ta-input-choices
        [input]="this.countryInput"
        [standalone]="true"
        (valueChanged)="this.onSubInputChanged()"
      ></ta-input-choices>
    </div>
  </div>
</div>

<ng-template #localityItemTpl let-item="item">
  <span class="locality-option">{{ item.zipCode }} {{ item.city }}</span>
</ng-template>

<ng-template #countryItemTpl let-item="item">
  <span class="locality-option">{{ item.name }}</span>
</ng-template>
