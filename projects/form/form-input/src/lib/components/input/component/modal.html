<ta-modal
  [open]="this.open()"
  size="medium"
  title="input.component.modal.title"
  (closeEvent)="this.closeEvent.emit()"
>
  <div modal-content>
    @if (this.inputData().template) {
      <ng-template
        [ngTemplateOutlet]="this.inputData().template"
        [ngTemplateOutletContext]="{ selectedValue$: this.selectedValue$ }"
      ></ng-template>
    }
  </div>
</ta-modal>
