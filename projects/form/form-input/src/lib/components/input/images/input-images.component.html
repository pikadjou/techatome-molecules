<div class="row g-0 align-items-center mb-space-2">
  <div class="col">
    <ta-form-label [input]="this.input"></ta-form-label>
  </div>
</div>

<ta-loader [isLoading]="this.requestState.isLoading()" size="sm">
  <div class="flex-column g-space-xs">
    @if (this.input.value?.length ?? 0 > 0) {
    <div class="grid g-space-md">
      @for(value of this.input.value; track value.id) {
      <div class="image-preview-wrapper one-fourth">
        <img [src]="value.url" class="image-preview" />
        <div class="image-remove">
          <ta-button
            type="danger"
            (action)="this.onFileDeleted(value)"
            icon="delete"
          >
          </ta-button>
        </div>
      </div>
      }
    </div>
    }
    <div class="flex-start">
      <ta-overlay-panel #addPanel [panelConfig]="{ manualTrigger: true, matchTriggerWidth: false }">
        <ng-template #panelTrigger>
          <ta-button type="tertiary" icon="add_a_photo" (action)="addPanel.open(true)">
            {{ 'input.images.add' | translate }}
          </ta-button>
        </ng-template>
        <ng-template #panelContent>
          <div class="add-image-menu flex-column">
            @if (this.showTakePhoto) {
              <button type="button" class="add-image-option" (click)="this.takePhoto(); addPanel.close()">
                <ta-font-icon name="add_a_photo" type="sm"></ta-font-icon>
                <span>{{ 'input.images.take-photo' | translate }}</span>
              </button>
            }
            <button type="button" class="add-image-option" (click)="this.openGallery(); addPanel.close()">
              <ta-font-icon name="image" type="sm"></ta-font-icon>
              <span>{{ 'input.images.gallery' | translate }}</span>
            </button>
          </div>
        </ng-template>
      </ta-overlay-panel>
    </div>
  </div>
</ta-loader>
