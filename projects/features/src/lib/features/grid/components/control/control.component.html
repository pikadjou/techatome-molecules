@if (this.isReady$ | async) {
  <div class="grid-control">
    @if (this.show().filters) {
      <ta-button
        icon="filter"
        type="secondary"
        [options]="{ circular: 'small' }"
        (action)="this.openFilters()"
      ></ta-button>
    }

    @if (this.show().preset && (this.grid.filters?.preset?.length ?? 0 > 0)) {
      <ta-overlay-panel [panelConfig]="{ matchTriggerWidth: false }">
        <ng-template #panelTrigger>
          <ta-button type="secondary" icon="tune" [options]="{ circular: 'small' }"></ta-button>
        </ng-template>
        <ng-template #panelContent>
          <div class="preset-menu">
            @for (preset of this.grid.filters?.preset; track preset.name) {
              <div class="preset-menu__item c-pointer" (click)="this.setPreset(preset)">
                {{ preset.name }}
              </div>
            }
          </div>
        </ng-template>
      </ta-overlay-panel>
    }

    @if (this.show().switchView) {
      <div class="grid-control__toggle">
        <ta-button
          icon="view_list"
          [type]="this.displayType() === 'grid' ? 'primary' : 'tertiary'"
          [options]="{ circular: 'small', border: this.displayType() !== 'grid' }"
          (action)="this.switchView('grid')"
        ></ta-button>
        <ta-button
          icon="grid_view"
          [type]="this.displayType() === 'card' ? 'primary' : 'tertiary'"
          [options]="{ circular: 'small', border: this.displayType() !== 'card' }"
          (action)="this.switchView('card')"
        ></ta-button>
      </div>
    }
  </div>
}
