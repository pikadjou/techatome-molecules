<button
  appStopPropagation
  [stopPropagationActivation]="this.stopPropagationActivation()"
  type="button"
  class="messenger-button pointer"
  [ngClass]="this.getClass()"
  (click)="handleClick()"
>
  <div class="flex-row g-space-sm align-center justify-center">
    <svg
      class="messenger-logo"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 800 800"
    >
      <defs>
        <linearGradient id="messenger-grad" x1="400" y1="800" x2="400" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#0099ff"/>
          <stop offset="1" stop-color="#a033ff"/>
        </linearGradient>
      </defs>
      <path
        class="messenger-logo-bg"
        d="M400,0C174.7,0,0,165.1,0,388.3c0,116.4,47.8,217.4,125.8,288.5a32.5,32.5,0,0,1,10.9,23.4l2.2,73.2a32.5,32.5,0,0,0,45.6,28.4l81.6-36a32.5,32.5,0,0,1,21.8-2.1A451.6,451.6,0,0,0,400,776.5c225.3,0,400-165.1,400-388.3S625.3,0,400,0Z"
      />
      <path
        class="messenger-logo-icon"
        d="M159.8,501.5,280.3,311.7a60,60,0,0,1,86.8-16l95.6,71.7a24,24,0,0,0,28.9-.1l129.1-98a19.1,19.1,0,0,1,27.7,25.3L527.8,484.3a60,60,0,0,1-86.8,16L345.4,428.6a24,24,0,0,0-28.9.1l-129.1,98A19.1,19.1,0,0,1,159.8,501.5Z"
      />
    </svg>
    @if (this.mode() === 'full') {
    <ng-content></ng-content>
    }
  </div>
</button>
