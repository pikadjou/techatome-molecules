@if (this.message() === '') {
  <ng-content></ng-content>
} @else {
  <div class="error-container">
    <div class="error-icon">
      <ta-font-icon name="sentiment_very_dissatisfied" type="xl"></ta-font-icon>
    </div>

    <span class="error-title">{{ 'ui.container.error.title' | translate }}</span>
    <span class="error-message">{{ this.message() | translate }}</span>

    @if (this.showRetry()) {
      <div class="error-cta">
        <ta-button type="secondary" (action)="this.onRetry()">
          {{ this.retryLabel() | translate }}
        </ta-button>
      </div>
    }
  </div>
}
