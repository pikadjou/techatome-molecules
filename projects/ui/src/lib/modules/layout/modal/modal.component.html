@if (this.open()) {
  <div class="ta-modal-backdrop" (click)="this.onBackdropClick()"></div>
  <div class="ta-modal-container" [class]="this.containerClass()">
    <div class="ta-modal-header">
      <ta-text [isBold]="true">{{ this.title() }}</ta-text>
      <div class="ta-modal-close" (click)="this.close()">
        <ta-font-icon name="close"></ta-font-icon>
      </div>
    </div>

    <div class="ta-modal-content" [class.ta-modal-content--fit]="this.contentFit()">
      <ng-content select="[modal-content]"></ng-content>
    </div>

    <div class="ta-modal-footer">
      <ng-content select="[modal-footer]"></ng-content>
    </div>
  </div>
}
