<div class="icons row align-items-center">
  <div class="image col-2">
    <ta-user-logo [userInfo]="this.userInfo()" size="lg" (click)="this.openProfile()"></ta-user-logo>
  </div>

  <div class="title col-8">
    <ta-logo (click)="this.goToHome()" color="black"></ta-logo>
  </div>

  <div class="notif col-2">
    <ta-font-icon
      name="notifications"
      type="lg"
      [class.disabled]="!this.notificationTemplate()"
      (click)="this.openNotification()"
    ></ta-font-icon>
  </div>
</div>

@if (this.profile()?.template; as tpl) {
  <ta-modal
    [open]="this.isProfileOpen()"
    size="fullscreen"
    title=""
    (closeEvent)="this.isProfileOpen.set(false)"
  >
    <div modal-content>
      <ng-template [ngTemplateOutlet]="tpl"></ng-template>
    </div>
  </ta-modal>
}

@if (this.notificationTemplate(); as tpl) {
  <ta-modal
    [open]="this.isNotifOpen()"
    size="fullscreen"
    title=""
    (closeEvent)="this.isNotifOpen.set(false)"
  >
    <div modal-content>
      <ng-template [ngTemplateOutlet]="tpl"></ng-template>
    </div>
  </ta-modal>
}
