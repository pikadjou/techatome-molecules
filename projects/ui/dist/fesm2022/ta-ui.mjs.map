<button
  appStopPropagation
  [stopPropagationActivation]="this.stopPropagationActivation()"
  type="button"
  class="whatsapp-button pointer"
  [ngClass]="this.getClass()"
  (click)="handleClick()"
>
  <div class="flex-row g-space-sm align-center justify-center">
    <svg
      class="whatsapp-logo"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 175.216 175.552"
    >
      <defs>
        <linearGradient id="whatsapp-grad" x1="85.915" y1="175.016" x2="85.915" y2="0.536" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#20b038"/>
          <stop offset="1" stop-color="#60d66a"/>
        </linearGradient>
      </defs>
      <path
        class="whatsapp-logo-bg"
        d="M87.184,0C39.04,0,0,39.04,0,87.184a86.743,86.743,0,0,0,11.712,43.648L0,175.552l46.272-11.456A86.86,86.86,0,0,0,87.184,175.552h.064C135.392,175.552,175.216,136.512,175.216,87.184S135.392,0,87.184,0Z"
      />
      <path
        class="whatsapp-logo-icon"
        d="M87.184,14.848A72.468,72.468,0,0,0,14.848,87.184a72.12,72.12,0,0,0,11.2,38.592l-7.36,26.88,27.52-7.2A72.2,72.2,0,0,0,87.248,157.7h.064a72.468,72.468,0,0,0,72.336-72.336A72.468,72.468,0,0,0,87.184,14.848ZM130.4,120.96c-1.856,5.216-10.784,9.984-14.848,10.56s-3.904,4.288-25.536-5.312S64.48,103.52,62.624,101.088s-15.168-20.16-15.168-38.464,9.6-27.264,13.024-30.976A13.718,13.718,0,0,1,70.4,27.36c1.28,0,2.56.064,3.68.128,3.456.128,5.184.32,7.456,5.76s7.84,19.136,8.512,20.544a5.127,5.127,0,0,1,.256,4.8,18.549,18.549,0,0,1-2.816,4.544c-1.408,1.6-2.944,3.584-4.224,4.8-1.408,1.408-2.88,2.944-1.216,5.76s7.36,12.16,15.808,19.712c10.88,9.728,20.032,12.736,22.88,14.144s4.48,1.216,6.144-.704,7.04-8.192,8.96-11.008,3.776-2.368,6.336-1.408,16.448,7.776,19.264,9.184,4.736,2.112,5.44,3.264S132.256,115.744,130.4,120.96Z"
      />
    </svg>
    @if (this.mode() === 'full') {
    <ng-content></ng-content>
    }
  </div>
</button>
