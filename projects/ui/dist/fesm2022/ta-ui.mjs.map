<button
  appStopPropagation
  [stopPropagationActivation]="this.stopPropagationActivation()"
  type="button"
  class="share-button pointer"
  [ngClass]="this.getClass()"
  (click)="handleClick()"
>
  <div class="flex-row g-space-sm align-center justify-center">
    <ta-font-icon name="share" [type]="this.getIconSize()"></ta-font-icon>
    <ng-content></ng-content>
  </div>
</button>
